<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Price Prediction</title>
</head>

<body>

    <h1>Car Price Prediction</h1>

    <form action="{{ url_for('prediction') }}" method="POST">

        <label for="year">Year:</label>
        <input type="number" id="year" name="year" required> <br><br>

        <label for="present_price">Present Price:</label>
        <input type="number" step="0.01" id="present_price" name="present_price" required>

        <br><br>

        <label for="kms_driven">Kilometers Driven:</label>
        <input type="number" id="kms_driven" name="kms_driven" required>

        <br><br>

        <label for="seller_type">Seller Type:</label>

        <select id="seller_type" name="seller_type">
            <option value="0">Dealer</option>
            <option value="1">Individual</option>
        </select>

        <br><br>

        <label for="transmission">Transmission:</label>

        <select id="transmission" name="transmission">
            <option value="0">Manual</option>
            <option value="1">Automatic</option>
        </select>

        <br><br>

        <label for="owner">Owner:</label>

        <input type="number" id="owner" name="owner" min="0" required>

        <br><br>

        <button type="submit">Predict Price</button>

    </form>
    <h2>The Prediction is {{result}}</h2>

</body>
</html>
